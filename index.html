<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Is het warm?</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #5b6573;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.5rem;
      transition: background 0.6s ease;
    }
    h1 {
      font-size: clamp(1.2rem, 4vw, 1.8rem);
      font-weight: 500;
      opacity: 0.9;
    }
    .answer {
      font-size: clamp(5rem, 28vw, 16rem);
      font-weight: 800;
      line-height: 1;
      margin-top: 1rem;
    }
    .ventilator-knop {
      margin-top: 2rem;
      padding: 0.7rem 1.4rem;
      font-size: 1rem;
      font-family: inherit;
      color: #fff;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .ventilator-knop:hover { background: rgba(255, 255, 255, 0.28); }
    .ventilator {
      width: clamp(4rem, 18vw, 7rem);
      height: clamp(4rem, 18vw, 7rem);
      margin-top: 1.5rem;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .ventilator.draait { opacity: 1; }
    .ventilator.draait .blad {
      transform-origin: 50% 50%;
      animation: draai 0.6s linear infinite;
    }
    @keyframes draai {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @media (prefers-reduced-motion: reduce) {
      .ventilator.draait .blad { animation: none; }
    }
    .poll {
      margin-top: 2.5rem;
      width: min(420px, 100%);
    }
    .poll h2 {
      font-size: clamp(1rem, 3.5vw, 1.3rem);
      font-weight: 500;
      opacity: 0.9;
      margin-bottom: 1rem;
    }
    .poll-knoppen {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
    }
    .stem-knop {
      flex: 1;
      max-width: 9rem;
      padding: 0.7rem 1rem;
      font-size: 1.1rem;
      font-weight: 700;
      font-family: inherit;
      color: #fff;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .stem-knop:hover:not(:disabled) { background: rgba(255, 255, 255, 0.28); }
    .stem-knop:disabled { cursor: default; opacity: 0.7; }
    .poll-uitslag { margin-top: 1.25rem; }
    .poll-uitslag[hidden] { display: none; }
    .balk-rij {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.6rem;
      font-size: 0.95rem;
    }
    .balk-label { width: 3rem; text-align: left; font-weight: 700; flex: none; }
    .balk-spoor {
      flex: 1;
      height: 0.85rem;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      overflow: hidden;
    }
    .balk-vulling {
      height: 100%;
      width: 0;
      background: rgba(255, 255, 255, 0.85);
      border-radius: 999px;
      transition: width 0.5s ease;
    }
    .balk-getal { width: 4.5rem; text-align: right; flex: none; opacity: 0.9; }
    .poll-melding { margin-top: 1rem; font-size: 0.9rem; opacity: 0.85; min-height: 1.2em; }
    .jouw-stem { margin-top: 0.75rem; font-size: 0.9rem; opacity: 0.9; }
    .jouw-stem[hidden] { display: none; }
  </style>
</head>
<body>
  <h1>Is het warm in Nederland?</h1>
  <div class="answer" id="answer">…</div>

  <button class="ventilator-knop" id="ventilatorKnop" type="button" aria-pressed="false">Ventilator aan</button>
  <svg class="ventilator" id="ventilator" viewBox="0 0 100 100" aria-hidden="true">
    <g class="blad" fill="currentColor">
      <path d="M50 50 C50 20 35 10 30 25 C26 37 40 45 50 50 Z"/>
      <path d="M50 50 C80 50 90 35 75 30 C63 26 55 40 50 50 Z"/>
      <path d="M50 50 C50 80 65 90 70 75 C74 63 60 55 50 50 Z"/>
      <path d="M50 50 C20 50 10 65 25 70 C37 74 45 60 50 50 Z"/>
    </g>
    <circle cx="50" cy="50" r="6" fill="currentColor"/>
  </svg>

  <section class="poll" aria-labelledby="pollVraag">
    <h2 id="pollVraag">Vind jij het warm?</h2>
    <div class="poll-knoppen">
      <button class="stem-knop" id="stemJa" type="button" data-keuze="warm">JA</button>
      <button class="stem-knop" id="stemNee" type="button" data-keuze="koud">NEE</button>
    </div>
    <div class="poll-uitslag" id="pollUitslag" hidden>
      <div class="balk-rij">
        <span class="balk-label">JA</span>
        <span class="balk-spoor"><span class="balk-vulling" id="vullingJa"></span></span>
        <span class="balk-getal" id="getalJa">0</span>
      </div>
      <div class="balk-rij">
        <span class="balk-label">NEE</span>
        <span class="balk-spoor"><span class="balk-vulling" id="vullingNee"></span></span>
        <span class="balk-getal" id="getalNee">0</span>
      </div>
      <p class="jouw-stem" id="jouwStem" hidden></p>
    </div>
    <p class="poll-melding" id="pollMelding"></p>
  </section>

  <script>
    // De Bilt — officieel KNMI-referentiepunt voor "het Nederlandse weer"
    const LAT = 52.10;
    const LON = 5.18;
    const WARM_DREMPEL = 20; // °C — middelpunt van de warmte-curve

    // Afstelling van de formule
    const TEMP_STEILHEID = 0.4; // k — hoe sterk de afwijking van de drempel meetelt
    const STEM_HALFWAARDE = 8;  // K — bij hoeveel stemmen de massa half zo zwaar weegt

    const answerEl = document.getElementById('answer');

    let huidigeTemp = null;             // laatst gemeten temperatuur (°C)
    let stemmen = { warm: 0, koud: 0 }; // huidige stemtotalen (JA = warm, NEE = koud)

    // Combineer temperatuur en stemmen tot één warmte-score (0–1) → JA/NEE.
    // - tempScore: logistische curve rond de drempel (hoe warmer, hoe hoger).
    // - stemAandeel: fractie JA-stemmen.
    // - stemGewicht: groeit met het aantal stemmen, zodat de massa de
    //   thermometer pas bij genoeg stemmen kan overstemmen.
    function bepaalAntwoord() {
      if (huidigeTemp === null) return; // temperatuur nog niet bekend
      const tempScore = 1 / (1 + Math.exp(-TEMP_STEILHEID * (huidigeTemp - WARM_DREMPEL)));
      const n = stemmen.warm + stemmen.koud;
      const stemAandeel = n ? stemmen.warm / n : 0;
      const stemGewicht = n / (n + STEM_HALFWAARDE);
      const score = (1 - stemGewicht) * tempScore + stemGewicht * stemAandeel;
      const warm = score >= 0.5;
      answerEl.textContent = warm ? 'JA' : 'NEE';
      document.body.style.background = warm ? '#e8590c' : '#1c7ed6';
    }

    async function laad() {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m`;
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        const t = data?.current?.temperature_2m;
        if (typeof t !== 'number') throw new Error('Geen temperatuur');
        huidigeTemp = t;
        bepaalAntwoord();
      } catch (err) {
        answerEl.textContent = '?';
        console.error(err);
      }
    }

    // Ventilator-toggle — puur visueel
    const ventilator = document.getElementById('ventilator');
    const ventilatorKnop = document.getElementById('ventilatorKnop');
    ventilatorKnop.addEventListener('click', () => {
      const aan = ventilator.classList.toggle('draait');
      ventilatorKnop.textContent = aan ? 'Ventilator uit' : 'Ventilator aan';
      ventilatorKnop.setAttribute('aria-pressed', String(aan));
    });

    // Gedeelde JA/NEE-poll via gratis counter-API (geen eigen database)
    const POLL_API = 'https://abacus.jasoncameron.dev';
    const POLL_NS = 'ishetwarm-nl-poll-v1';
    const LABELS = { warm: 'JA', koud: 'NEE' };

    // ISO-weeknummer (maandag = weekstart) — tellers en stemvlag resetten zo per week.
    function isoWeekId(d = new Date()) {
      const datum = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
      const dagNr = (datum.getUTCDay() + 6) % 7;         // maandag = 0 … zondag = 6
      datum.setUTCDate(datum.getUTCDate() - dagNr + 3);  // donderdag van deze week
      const isoJaar = datum.getUTCFullYear();
      const eersteDonderdag = new Date(Date.UTC(isoJaar, 0, 4));
      const eersteDagNr = (eersteDonderdag.getUTCDay() + 6) % 7;
      eersteDonderdag.setUTCDate(eersteDonderdag.getUTCDate() - eersteDagNr + 3);
      const week = 1 + Math.round((datum - eersteDonderdag) / 6048e5); // 6048e5 = ms per week
      return `${isoJaar}w${String(week).padStart(2, '0')}`;
    }

    const WEEK = isoWeekId();                       // bijv. "2026w27"
    const STEM_SLEUTEL = `ishetwarm-stem-${WEEK}`;  // localStorage-vlag, per week

    const stemJa = document.getElementById('stemJa');
    const stemNee = document.getElementById('stemNee');
    const stemKnoppen = [stemJa, stemNee];
    const pollUitslag = document.getElementById('pollUitslag');
    const pollMelding = document.getElementById('pollMelding');
    const jouwStemEl = document.getElementById('jouwStem');
    const vulling = { warm: document.getElementById('vullingJa'), koud: document.getElementById('vullingNee') };
    const getal = { warm: document.getElementById('getalJa'), koud: document.getElementById('getalNee') };

    // Tellernaam = keuze + huidige week, bijv. "warm-2026w27" → start elke week op 0.
    const tellerNaam = (keuze) => `${keuze}-${WEEK}`;

    async function tellerGet(keuze) {
      const res = await fetch(`${POLL_API}/get/${POLL_NS}/${tellerNaam(keuze)}`);
      if (res.status === 404) return 0; // teller bestaat nog niet (nieuwe week)
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return (await res.json()).value ?? 0;
    }

    async function tellerHit(keuze) {
      const res = await fetch(`${POLL_API}/hit/${POLL_NS}/${tellerNaam(keuze)}`);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return (await res.json()).value ?? 0;
    }

    function toonStand() {
      const { warm, koud } = stemmen;
      const totaal = warm + koud;
      const pct = (n) => totaal ? Math.round((n / totaal) * 100) : 0;
      vulling.warm.style.width = pct(warm) + '%';
      vulling.koud.style.width = pct(koud) + '%';
      getal.warm.textContent = totaal ? `${warm} (${pct(warm)}%)` : '0';
      getal.koud.textContent = totaal ? `${koud} (${pct(koud)}%)` : '0';
      pollUitslag.hidden = false;
    }

    // Actuele stemtotalen ophalen (zonder op te hogen) en het antwoord herberekenen.
    async function haalStemmen() {
      const [warm, koud] = await Promise.all([tellerGet('warm'), tellerGet('koud')]);
      stemmen = { warm, koud };
      bepaalAntwoord();
    }

    function markeerStem(keuze) {
      stemKnoppen.forEach((b) => { b.disabled = true; });
      jouwStemEl.textContent = `Jij stemde: ${LABELS[keuze]}`;
      jouwStemEl.hidden = false;
    }

    async function stem(keuze) {
      stemKnoppen.forEach((b) => { b.disabled = true; });
      pollMelding.textContent = '';
      try {
        await tellerHit(keuze);
        localStorage.setItem(STEM_SLEUTEL, keuze);
        markeerStem(keuze);
        await haalStemmen();
        toonStand();
      } catch (err) {
        console.error(err);
        pollMelding.textContent = 'Stemmen lukt nu even niet. Probeer het later opnieuw.';
        const alGestemd = localStorage.getItem(STEM_SLEUTEL);
        stemKnoppen.forEach((b) => { b.disabled = Boolean(alGestemd); });
      }
    }

    stemJa.addEventListener('click', () => stem('warm'));
    stemNee.addEventListener('click', () => stem('koud'));

    // Start: temperatuur én stemmen ophalen. De stemmen tellen mee in het
    // antwoord, dus we halen ze altijd op — ook als deze bezoeker nog niet stemde.
    // De balken tonen we pas nadat iemand zelf gestemd heeft.
    laad();
    (async () => {
      const alGestemd = localStorage.getItem(STEM_SLEUTEL);
      const heeftGestemd = alGestemd === 'warm' || alGestemd === 'koud';
      if (heeftGestemd) markeerStem(alGestemd);
      try {
        await haalStemmen();
        if (heeftGestemd) toonStand();
      } catch (err) {
        console.error(err);
        if (heeftGestemd) pollMelding.textContent = 'De stand kan nu even niet geladen worden.';
      }
    })();
  </script>
</body>
</html>
